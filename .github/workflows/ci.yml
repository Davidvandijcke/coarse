name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

permissions: read-all

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      # tests/test_pipeline_spec.py shells out to
      # `node --experimental-strip-types` to run `web/src/lib/estimateCost.ts`
      # directly for the Python↔TS cost-gate parity check. The
      # `--experimental-strip-types` flag landed in Node 22.6, and the GitHub
      # `ubuntu-latest` runner currently defaults to Node 20 LTS, which exits
      # with code 9 ("bad option") on that flag. Pinning Node 22 here keeps
      # the parity test green without forcing every contributor to upgrade
      # their local Node too.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (advisory)
        run: uv run ruff check src/ tests/
        continue-on-error: true

      - name: Run tests
        run: uv run pytest tests/ -v
        env:
          OPENROUTER_API_KEY: ""
          GOOGLE_API_KEY: ""
          OPENAI_API_KEY: ""
          ANTHROPIC_API_KEY: ""

      - name: Resolve optional docling stack
        run: |
          uv sync --extra dev --extra docling --locked
          uv run python - <<'PY'
          import instructor
          import transformers
          print("instructor", instructor.__version__)
          print("transformers", transformers.__version__)
          PY

  version-check:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4

      - name: Check version consistency
        run: |
          PYPROJECT_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          INIT_VERSION=$(grep '__version__' src/coarse/__init__.py | sed 's/.*"\(.*\)".*/\1/')
          echo "pyproject.toml: $PYPROJECT_VERSION"
          echo "__init__.py:    $INIT_VERSION"
          if [ "$PYPROJECT_VERSION" != "$INIT_VERSION" ]; then
            echo "ERROR: Version mismatch!"
            exit 1
          fi
