name: Daily capacity monitor
on:
  schedule:
    - cron: '0 8 * * *'  # 8 AM UTC daily
  workflow_dispatch: {}   # Allow manual trigger

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Query review counts
        id: counts
        run: |
          # Monthly review count
          SINCE=$(date -u -d '-30 days' +%Y-%m-%dT%H:%M:%S)
          MONTHLY=$(curl -sf "${{ secrets.SUPABASE_URL }}/rest/v1/rpc/count_reviews_since" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"since\": \"${SINCE}\"}")
          echo "monthly=$MONTHLY" >> "$GITHUB_OUTPUT"

          # Daily review count
          SINCE_DAY=$(date -u -d '-1 day' +%Y-%m-%dT%H:%M:%S)
          DAILY=$(curl -sf "${{ secrets.SUPABASE_URL }}/rest/v1/rpc/count_reviews_since" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"since\": \"${SINCE_DAY}\"}")
          echo "daily=$DAILY" >> "$GITHUB_OUTPUT"

          echo "Monthly reviews: $MONTHLY"
          echo "Daily reviews: $DAILY"

          # Determine alert level
          ALERT="none"
          BODY=""

          # 5000 reviews/day ≈ 10000 emails. Resend's Pro tier is 50k/month
          # (≈1666/day amortized), so 10000/day for one day is fine but
          # sustained load at this level would burn through the monthly
          # quota in under a week. This warning is a soft "watch the
          # monthly quota" signal; the frontend hard cap in
          # web/src/lib/emailCapacity.ts still kicks in at
          # EMAIL_CAPACITY_REVIEW_THRESHOLD (2500) if daily volume spikes.
          # Pre-migration threshold was 200 (Gmail 500/day cap); bumped
          # 2026-04-13 on the Resend migration.
          if [ "$DAILY" -gt 5000 ] 2>/dev/null; then
            ALERT="warning"
            BODY="Daily reviews ($DAILY) high — monitor Resend monthly quota.\n\n"
          fi

          if [ "$MONTHLY" -gt 300 ] 2>/dev/null; then
            ALERT="warning"
            BODY="${BODY}Monthly reviews ($MONTHLY) approaching Modal free tier ($30/mo).\n\n"
          fi

          if [ "$MONTHLY" -gt 800 ] 2>/dev/null; then
            ALERT="critical"
            BODY="${BODY}CRITICAL: Monthly reviews ($MONTHLY) exceeded safe threshold. Auto-pausing submissions.\n\n"
          fi

          BODY="${BODY}See deploy/CAPACITY.md for expansion instructions."

          echo "alert=$ALERT" >> "$GITHUB_OUTPUT"
          # Use delimiter for multiline body
          {
            echo "body<<ENDOFBODY"
            echo -e "$BODY"
            echo "ENDOFBODY"
          } >> "$GITHUB_OUTPUT"

      - name: Auto-pause submissions (critical)
        if: steps.counts.outputs.alert == 'critical'
        run: |
          curl -sf "${{ secrets.SUPABASE_URL }}/rest/v1/system_status?id=eq.1" \
            -X PATCH \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"accepting_reviews": false, "banner_message": "Monthly capacity reached. Please use the CLI: pip install coarse-ink", "updated_at": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}'
          echo "Submissions auto-paused."

      - name: Send alert email via Resend
        if: steps.counts.outputs.alert != 'none'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          ALERT: ${{ steps.counts.outputs.alert }}
          MONTHLY: ${{ steps.counts.outputs.monthly }}
          DAILY: ${{ steps.counts.outputs.daily }}
          BODY: ${{ steps.counts.outputs.body }}
        run: |
          if [ -z "$RESEND_API_KEY" ] || [ -z "$ALERT_EMAIL" ]; then
            echo "RESEND_API_KEY or ALERT_EMAIL unset; skipping alert send."
            exit 0
          fi
          SUBJECT="[coarse] Capacity ${ALERT}: ${MONTHLY} reviews this month"
          # Build the JSON payload via jq so multi-line bodies, quotes,
          # and any stray characters in $BODY can't break out of the
          # JSON string or inject header fields.
          PAYLOAD=$(jq -n \
            --arg from "coarse-monitor <reviews@coarse.ink>" \
            --arg to "$ALERT_EMAIL" \
            --arg subject "$SUBJECT" \
            --arg text "$(printf 'coarse capacity monitor\n\nMonthly reviews (30d): %s\nDaily reviews (24h): %s\n\n%s\n' "$MONTHLY" "$DAILY" "$BODY")" \
            '{from: $from, to: [$to], subject: $subject, text: $text}')
          HTTP_CODE=$(curl -sS -o /tmp/resend_resp.json -w "%{http_code}" \
            -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          echo "Resend HTTP $HTTP_CODE"
          cat /tmp/resend_resp.json
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "202" ]; then
            echo "::error::Resend alert send failed with HTTP $HTTP_CODE"
            exit 1
          fi
